# This workflow uploads the Python package when a GitHub Release is published.

name: Upload Python Package

on:
  release:
    types: [published]

jobs:
  build:
    name: Build source distribution and wheels
    runs-on: ubuntu-22.04
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build source distribution and wheels
        run: |
          python -m pip install --upgrade pip
          python -m pip install build cibuildwheel
          python -m build --sdist --outdir dist
          bash packaging/python/build_wheels.bash linux all
          cp wheelhouse/*.whl dist/

      - name: Upload package distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: dist/*

  test:
    name: Test wheel on Python ${{ matrix.python-version }}
    needs: build
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download package distributions
        uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: dist/

      - name: Test installed wheel
        run: |
          python_tag="$(python -c 'import sys; print(f"cp{sys.version_info.major}{sys.version_info.minor}")')"
          bash packaging/python/test_wheel.sh "$(command -v python)" "dist/mind_simulator-*-${python_tag}-*.whl"

  deploy:
    name: Publish package distributions to PyPI
    needs: test
    runs-on: ubuntu-22.04
    environment:
      name: pypi
      url: https://pypi.org/p/mind-simulator
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download package distributions
        uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: dist/

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
