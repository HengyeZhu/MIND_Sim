name: MIND_Sim Release

on:
  workflow_dispatch:
    inputs:
      rel_branch:
        description: "Release branch/commit"
        default: "main"
        required: true
      rel_tag:
        description: "Release version (tag name)"
        default: "v0.1.0"
        required: true
      upload:
        description: "Whether to actually upload any files (releases, wheels, etc.)"
        required: true
        default: false
        type: boolean

env:
  GH_REPO: ${{ github.server_url }}/${{ github.repository }}
  REL_BRANCH: ${{ github.event.inputs.rel_branch }}
  REL_TAG: ${{ github.event.inputs.rel_tag }}
  RELEASE_DESCRIPTION: MIND_Sim is designed for studying Multiscale Integrative Neuronal Dynamics

jobs:
  tag-n-release:
    name: tag-n-release ${{ github.event.inputs.rel_tag }} (${{ github.event.inputs.rel_branch }})
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout release branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.rel_branch }}
          submodules: recursive

      - name: Create and upload tag
        if: github.event.inputs.upload == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git tag -a "${REL_TAG}" -m "${REL_TAG}"
          git push origin "${REL_TAG}"

      - name: Create GitHub Release
        if: github.event.inputs.upload == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${REL_TAG}" \
            --repo "${GH_REPO}" \
            --title "Release ${REL_TAG}" \
            --notes "${RELEASE_DESCRIPTION}" \
            --verify-tag

      - name: Dry run summary
        if: github.event.inputs.upload != 'true'
        run: |
          echo "Dry run only."
          echo "Release branch: ${REL_BRANCH}"
          echo "Release tag: ${REL_TAG}"
